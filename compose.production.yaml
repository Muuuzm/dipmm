services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:./data/dev.db
    volumes:
      - /var/lib/parih/data:/app/prisma/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/public/salon"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - parih_internal

  proxy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /var/lib/parih/caddy/data:/data
      - /var/lib/parih/caddy/config:/config
    networks:
      - parih_internal

networks:
  parih_internal:
    name: parih_internal
